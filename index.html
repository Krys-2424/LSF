<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSF — Mon Parcours Visuel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&family=Nunito+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5ede0;--bg-card:#fdf6ec;--bg-card2:#ede0cc;--bg-side:#e8d5bc;--txt:#2c1f0e;--muted:#7a5c3a;--light:#b8956a;--a:#8b4513;--a2:#c47d3a;--a3:#d4a96a;--bdr:rgba(139,69,19,.15);--bdr2:rgba(139,69,19,.3);--sh:rgba(92,51,13,.12);--sh2:rgba(92,51,13,.22);--streak:#e07b2a;--bdgbg:#f0e0c8;--grain:.04;--tog:#d4b896}
[data-theme="dark"]{--bg:#1a1108;--bg-card:#231808;--bg-card2:#2e2010;--bg-side:#1e1409;--txt:#f0e0c8;--muted:#c9a87a;--light:#8a6a45;--a:#c47d3a;--a2:#e09a50;--a3:#a06030;--bdr:rgba(196,125,58,.15);--bdr2:rgba(196,125,58,.3);--sh:rgba(0,0,0,.35);--sh2:rgba(0,0,0,.55);--streak:#e8923a;--bdgbg:#2a1c0a;--grain:.06;--tog:#3a2510}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;letter-spacing:.01em;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .4s,color .4s;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:var(--grain);pointer-events:none;z-index:9999}
.wrap{display:grid;grid-template-columns:270px 1fr;min-height:100vh}
.side{background:var(--bg-side);border-right:1px solid var(--bdr2);padding:28px 20px;display:flex;flex-direction:column;gap:22px;position:sticky;top:0;height:100vh;overflow-y:auto;transition:background .4s}
.logo{font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:900;color:var(--a);line-height:1.1}
.logo small{display:block;font-family:'Nunito',sans-serif;font-size:.6rem;font-weight:400;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-top:4px}
.streak-box{background:var(--bg-card);border:1px solid var(--bdr2);border-radius:14px;padding:16px;text-align:center;box-shadow:0 4px 14px var(--sh)}
.flame{font-size:2rem;display:block;animation:flicker 2s ease-in-out infinite alternate}
@keyframes flicker{0%{transform:scaleY(1) rotate(-2deg)}50%{transform:scaleY(1.08) rotate(1deg)}100%{transform:scaleY(.96) rotate(-1deg)}}
.streak-n{font-family:'Nunito',sans-serif;font-size:2.2rem;font-weight:900;color:var(--streak);line-height:1;margin-top:2px}
.streak-lbl{font-family:'Nunito',sans-serif;font-size:.6rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.streak-days{display:flex;justify-content:center;gap:4px;margin-top:10px}
.sd{width:26px;height:26px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:.58rem;font-family:'Nunito',sans-serif;color:var(--light)}
.sd.done{background:var(--streak);border-color:var(--streak);color:#fff}
.sd.today{border-color:var(--a2);color:var(--a2)}
.gprog{background:var(--bg-card);border:1px solid var(--bdr);border-radius:12px;padding:13px}
.prow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.plbl{font-family:'Nunito',sans-serif;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.ppct{font-family:'Nunito',sans-serif;font-weight:700;font-size:.95rem;color:var(--a2)}
.ptrack{height:5px;background:var(--bdr);border-radius:99px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--a),var(--a2));border-radius:99px;transition:width .8s}
.nav-title{font-family:'Nunito',sans-serif;font-size:.58rem;text-transform:uppercase;letter-spacing:.15em;color:var(--light);margin-bottom:6px}
.nav-list{display:flex;flex-direction:column;gap:5px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;border:1px solid transparent;background:transparent;cursor:pointer;color:var(--muted);font-family:'Nunito Sans',sans-serif;font-size:.92rem;text-align:left;transition:all .2s;width:100%}
.nav-btn:hover{background:var(--bg-card);border-color:var(--bdr);color:var(--txt)}
.nav-btn.open{background:var(--bg-card);border-color:var(--bdr2);color:var(--txt)}
.nav-btn .nbadge{font-family:'Nunito',sans-serif;font-size:.52rem;background:var(--bdgbg);color:var(--a);padding:2px 6px;border-radius:20px;margin-left:auto;flex-shrink:0}
.nav-btn .chev{font-size:.7rem;transition:transform .3s;color:var(--light);flex-shrink:0}
.nav-btn.open .chev{transform:rotate(90deg)}
.bdg-nav{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;border:1px solid var(--bdr);background:var(--bg-card);cursor:pointer;color:var(--muted);font-family:'Nunito Sans',sans-serif;font-size:.92rem;text-align:left;transition:all .2s;width:100%}
.bdg-nav:hover{border-color:var(--a2);color:var(--a2)}
.theme-row{display:flex;align-items:center;gap:10px;margin-top:auto}
.tog-track{width:44px;height:22px;background:var(--tog);border-radius:99px;cursor:pointer;position:relative;border:1px solid var(--bdr2);flex-shrink:0}
.tog-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;background:var(--a);border-radius:50%;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
[data-theme="dark"] .tog-thumb{transform:translateX(22px)}
.tog-lbl{font-family:'Nunito',sans-serif;font-size:.58rem;color:var(--muted)}
.main{padding:28px 32px;overflow-y:auto}
.main-top{padding-bottom:18px;border-bottom:1px solid var(--bdr);margin-bottom:22px;display:flex;align-items:center;justify-content:space-between}
.main-title{font-family:'Nunito',sans-serif;font-size:1.6rem;font-weight:900;color:var(--txt)}
.main-sub{font-size:.9rem;color:var(--muted);margin-top:3px}
.bdg-pill{display:flex;align-items:center;gap:7px;background:var(--bdgbg);border:1px solid var(--bdr);border-radius:99px;padding:6px 14px;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;font-size:.6rem;color:var(--muted)}
.bdg-pill:hover{border-color:var(--a2);color:var(--a2)}
.levels-list{display:flex;flex-direction:column;gap:10px}
.acc-item{border:1px solid var(--bdr);border-radius:15px;overflow:hidden;transition:border-color .25s,box-shadow .25s}
.acc-item.open{border-color:var(--bdr2);box-shadow:0 4px 20px var(--sh)}
.acc-head{display:flex;align-items:center;gap:14px;padding:17px 20px;cursor:pointer;background:var(--bg-card);transition:background .2s;user-select:none;-webkit-tap-highlight-color:transparent}
.acc-head:hover{background:var(--bg-card2)}
.acc-emoji{font-size:1.5rem;flex-shrink:0;pointer-events:none}
.acc-info{flex:1;pointer-events:none}
.acc-code{font-family:'Nunito',sans-serif;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--light);margin-bottom:2px}
.acc-name{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--txt)}
.acc-right{display:flex;align-items:center;gap:8px;flex-shrink:0;pointer-events:none}
.acc-pct{font-family:'Nunito',sans-serif;font-size:.62rem;color:var(--a2)}
.acc-mini{width:55px;height:4px;background:var(--bdr);border-radius:99px;overflow:hidden}
.acc-mini-f{height:100%;background:linear-gradient(90deg,var(--a),var(--a2));border-radius:99px;transition:width .5s}
.acc-chev{font-size:.8rem;color:var(--light);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.acc-item.open .acc-chev{transform:rotate(180deg)}
.acc-body{display:none;padding:0 20px 20px;background:var(--bg-card)}
.acc-item.open .acc-body{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.obj-box{background:var(--bg-card2);border-radius:9px;padding:11px 15px;margin-bottom:14px;font-size:.92rem;color:var(--muted);line-height:1.5;border-left:3px solid var(--a2)}
.dur-tag{display:inline-flex;align-items:center;gap:5px;background:var(--bdgbg);border:1px solid var(--bdr);border-radius:99px;padding:3px 10px;font-family:'Nunito',sans-serif;font-size:.55rem;color:var(--muted);margin-bottom:6px}
.focus-sm{display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px solid var(--a);color:var(--a);border-radius:8px;padding:7px 14px;font-family:'Nunito',sans-serif;font-size:.58rem;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;transition:all .2s;margin-top:10px;margin-bottom:18px}
.focus-sm:hover{background:var(--a);color:#fff}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:13px}
.card{background:var(--bg);border:1px solid var(--bdr);border-radius:12px;padding:16px;transition:all .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--a),var(--a2));opacity:0;transition:opacity .3s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px var(--sh2);border-color:var(--bdr2)}
.card:hover::before{opacity:1}
.card.full{grid-column:1/-1}
.cico{font-size:1.3rem;display:block;margin-bottom:7px}
.ctit{font-family:'Nunito',sans-serif;font-size:.98rem;font-weight:700;color:var(--txt);margin-bottom:6px}
.cbod{font-size:.88rem;color:var(--muted);line-height:1.5}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.tag{font-family:'Nunito',sans-serif;font-size:.52rem;padding:2px 7px;border-radius:99px;background:var(--bg-card2);color:var(--a);border:1px solid var(--bdr)}
.sbox{background:var(--bg-card2);border-radius:8px;padding:10px 12px;margin-top:8px;font-family:'Nunito',sans-serif;font-size:.65rem;line-height:1.9;color:var(--muted);border:1px solid var(--bdr)}
.sbox b{color:var(--a2)}
.err-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.err-item{padding:9px 11px;border-radius:8px;border-left:3px solid var(--a3);background:var(--bg-card2)}
.err-p{font-family:'Nunito',sans-serif;font-size:.55rem;text-transform:uppercase;letter-spacing:.06em;color:var(--a3);margin-bottom:3px}
.err-f{font-size:.86rem;color:var(--muted);line-height:1.4}
/* vocab search */
.vsearch{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--bdr2);background:var(--bg-card2);color:var(--txt);font-family:'Nunito Sans',sans-serif;font-size:.9rem;margin-bottom:10px;outline:none;transition:border-color .2s}
.vsearch:focus{border-color:var(--a2)}
.vcols{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:4px;max-height:340px;overflow-y:auto;padding-right:4px}
.vcols::-webkit-scrollbar{width:4px}
.vcols::-webkit-scrollbar-track{background:var(--bdr)}
.vcols::-webkit-scrollbar-thumb{background:var(--a3);border-radius:99px}
/* checklist */
.cl{display:flex;flex-direction:column;gap:7px;margin-top:5px}
.ci{display:flex;align-items:flex-start;gap:9px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.ci:hover{background:var(--bg-card2)}
.ci:active{opacity:.7}
.cb{width:19px;height:19px;border-radius:5px;border:2px solid var(--bdr2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--bg-card2);margin-top:1px;pointer-events:none}
.cb.on{background:var(--a);border-color:var(--a);animation:pop .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(.6)}100%{transform:scale(1)}}
.cb.on::after{content:'✓';color:#fff;font-size:.68rem;font-weight:bold}
.ctxt{font-size:.9rem;color:var(--muted);line-height:1.35;pointer-events:none}
.ctxt.done{text-decoration:line-through;color:var(--light)}
.xpbar{margin-top:11px}
.xrow{display:flex;justify-content:space-between;margin-bottom:4px}
.xlbl{font-family:'Nunito',sans-serif;font-size:.56rem;text-transform:uppercase;letter-spacing:.07em;color:var(--light)}
.xval{font-family:'Nunito',sans-serif;font-size:.6rem;color:var(--a2)}
.xtrack{height:4px;background:var(--bdr);border-radius:99px;overflow:hidden}
.xfill{height:100%;background:linear-gradient(90deg,var(--a3),var(--a2));border-radius:99px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.vlist{display:flex;flex-direction:column;gap:7px;margin-top:7px}
.vitem{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;background:var(--bg-card2);border:1px solid var(--bdr);text-decoration:none;color:var(--muted);transition:all .2s;font-size:.86rem}
.vitem:hover{border-color:var(--a2);color:var(--a2);background:var(--bg-card);transform:translateX(3px)}
.varr{margin-left:auto;font-size:.68rem;opacity:.6;flex-shrink:0}
.vitem-special{border-color:var(--a3) !important}
.vitem-special:hover{border-color:var(--a2) !important}
/* ressources box */
.res-box{background:var(--bg-card2);border:1px solid var(--bdr2);border-radius:10px;padding:12px 14px;margin-top:8px}
.res-title{font-family:'Nunito',sans-serif;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--a2);margin-bottom:8px}
.res-link{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;background:var(--bg-card);border:1px solid var(--bdr);text-decoration:none;color:var(--muted);font-size:.84rem;transition:all .2s;margin-bottom:5px}
.res-link:hover{border-color:var(--a2);color:var(--a2);transform:translateX(2px)}
.res-link:last-child{margin-bottom:0}
/* focus overlay */
.fov{display:none;position:fixed;inset:0;background:var(--bg);z-index:1000;align-items:center;justify-content:center;flex-direction:column;padding:40px;transition:background .4s}
.fov.on{display:flex}
.fclose{position:absolute;top:18px;right:18px;background:var(--bg-card);border:1px solid var(--bdr);border-radius:8px;padding:7px 13px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;transition:all .2s}
.fclose:hover{border-color:var(--a);color:var(--a)}
.finner{max-width:500px;width:100%;text-align:center}
.femoji{font-size:3.2rem;display:block;margin-bottom:14px}
.ftitle{font-family:'Nunito',sans-serif;font-size:1.9rem;font-weight:900;color:var(--txt);margin-bottom:10px}
.fdesc{font-size:1rem;color:var(--muted);line-height:1.6;margin-bottom:24px;background:var(--bg-card);padding:13px 16px;border-radius:11px;border:1px solid var(--bdr)}
.ftimer{font-family:'Nunito',sans-serif;font-size:4.5rem;font-weight:900;color:var(--a);line-height:1;margin-bottom:14px}
.fbtns{display:flex;gap:8px;justify-content:center}
.fb{background:var(--a);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-family:'Nunito Sans',sans-serif;font-size:1rem;cursor:pointer;transition:all .2s}
.fb:hover{background:var(--a2);transform:scale(1.02)}
.fb.sec{background:transparent;border:1px solid var(--bdr2);color:var(--muted)}
.fb.sec:hover{border-color:var(--a);color:var(--a)}
.bg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:11px;margin-top:10px}
.bg-item{background:var(--bg-card);border:1px solid var(--bdr);border-radius:12px;padding:15px 11px;text-align:center;transition:all .25s;position:relative}
.bg-item.ok{border-color:var(--a2);box-shadow:0 0 0 2px var(--a2)}
.bg-item.locked{opacity:.38;filter:grayscale(.6)}
.bg-ico{font-size:1.8rem;display:block;margin-bottom:6px}
.bg-name{font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:700;color:var(--txt);line-height:1.2;margin-bottom:3px}
.bg-desc{font-size:.68rem;color:var(--muted);line-height:1.3}
.bg-ok{font-family:'Nunito',sans-serif;font-size:.5rem;text-transform:uppercase;color:var(--a2);margin-top:4px;display:block}
.bg-lock{position:absolute;top:6px;right:6px;font-size:.6rem;opacity:.4}
.toast{position:fixed;bottom:22px;right:22px;background:var(--a);color:#fff;padding:10px 17px;border-radius:10px;font-family:'Nunito Sans',sans-serif;font-size:.95rem;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:99999;transform:translateY(60px);opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* STRUCTURES DE PHRASES */
.struct-list{display:flex;flex-direction:column;gap:12px;margin-top:10px}
.struct-row{background:var(--bg-card2);border-radius:11px;padding:13px 15px;border:1px solid var(--bdr);transition:border-color .2s}
.struct-row:hover{border-color:var(--bdr2)}
.struct-name{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;color:var(--a);margin-bottom:10px;display:flex;align-items:center;gap:7px;letter-spacing:.01em}
.struct-name::before{content:'▸';color:var(--a2);font-size:.85rem;flex-shrink:0}
.struct-tokens{display:flex;flex-wrap:wrap;align-items:center;gap:5px}
.struct-token{font-family:'Nunito',sans-serif;font-size:.78rem;padding:5px 11px;border-radius:8px;background:var(--bg);border:2px solid var(--bdr2);color:var(--txt);font-weight:700;white-space:nowrap;letter-spacing:.01em}
.struct-arrow{font-size:1.1rem;color:var(--a2);flex-shrink:0;font-weight:900;margin:0 2px}
.struct-card{grid-column:1/-1}
@media(max-width:680px){.wrap{grid-template-columns:1fr}.side{position:relative;height:auto}.main{padding:18px}.cgrid{grid-template-columns:1fr}}
/* NOTES */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-top:4px}
.note-card{background:var(--bg-card);border:1px solid var(--bdr);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:10px;transition:border-color .2s}
.note-card:hover{border-color:var(--bdr2)}
.note-head{display:flex;align-items:center;gap:10px}
.note-emoji{font-size:1.4rem}
.note-label{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--txt)}
.note-code{font-family:'Nunito',sans-serif;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--light);margin-top:1px}
.note-textarea{width:100%;min-height:160px;background:var(--bg);border:1px solid var(--bdr2);border-radius:9px;padding:12px;font-family:'Nunito Sans',sans-serif;font-size:.95rem;color:var(--txt);resize:vertical;outline:none;line-height:1.6;transition:border-color .2s}
.note-textarea:focus{border-color:var(--a2)}
.note-textarea::placeholder{color:var(--light);font-style:italic}
.note-footer{display:flex;align-items:center;justify-content:space-between}
.note-saved{font-family:'Nunito',sans-serif;font-size:.55rem;color:var(--a2);opacity:0;transition:opacity .4s;letter-spacing:.06em}
.note-saved.show{opacity:1}
.note-clear{font-family:'Nunito',sans-serif;font-size:.52rem;text-transform:uppercase;letter-spacing:.06em;color:var(--light);background:transparent;border:1px solid var(--bdr);border-radius:6px;padding:3px 8px;cursor:pointer;transition:all .2s}
.note-clear:hover{border-color:var(--a3);color:var(--a3)}
.note-global{background:var(--bg-card);border:1px solid var(--bdr2);border-radius:14px;padding:18px;margin-bottom:16px}
.note-global-title{font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:700;color:var(--txt);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.note-global-area{width:100%;min-height:100px;background:var(--bg);border:1px solid var(--bdr2);border-radius:9px;padding:12px;font-family:'Nunito Sans',sans-serif;font-size:.95rem;color:var(--txt);resize:vertical;outline:none;line-height:1.6;transition:border-color .2s}
.note-global-area:focus{border-color:var(--a2)}
.note-global-area::placeholder{color:var(--light);font-style:italic}


/* ─── NOUVELLES VUES ─────────────────────────────────────── */
.signa-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
@media(max-width:860px){.signa-layout{grid-template-columns:1fr}}
.sp{background:var(--bg-card);border:1px solid var(--bdr);border-radius:13px;overflow:hidden}
.sp-head{padding:11px 15px;background:linear-gradient(135deg,#1b3d2a,#0a4d2d);display:flex;align-items:center;gap:9px}
.sp-head-ico{width:32px;height:32px;background:rgba(74,222,128,.18);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.sp-head h3{font-family:'Nunito',sans-serif;font-size:.84rem;font-weight:900;color:#fff;margin:0}
.sp-head p{font-size:.6rem;color:rgba(255,255,255,.55);margin:2px 0 0}
.sn-msgs{overflow-y:auto;padding:11px;display:flex;flex-direction:column;gap:7px;min-height:260px;max-height:320px}
.smsg{display:flex;gap:7px;align-items:flex-end;animation:fadeUp .2s ease}
.smsg.user{flex-direction:row-reverse}
.smsg-bub{max-width:82%;padding:8px 12px;border-radius:13px;font-size:.8rem;line-height:1.6}
.smsg.ai  .smsg-bub{background:var(--bg-card2);border:1px solid var(--bdr);border-bottom-left-radius:3px;color:var(--txt)}
.smsg.user .smsg-bub{background:linear-gradient(135deg,#0a4d2d,#146434);color:#fff;border-bottom-right-radius:3px}
.smsg-ico{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.smsg.ai  .smsg-ico{background:linear-gradient(135deg,#0a4d2d,#146434)}
.smsg.user .smsg-ico{background:var(--bg-card2);border:1px solid var(--bdr)}
.sn-chips{display:flex;flex-wrap:wrap;gap:5px;padding:7px 11px;border-top:1px solid var(--bdr)}
.sn-chip{padding:3px 9px;background:var(--bg-card2);border:1px solid var(--bdr2);border-radius:99px;font-family:'Nunito',sans-serif;font-size:.62rem;font-weight:700;color:var(--a);cursor:pointer;transition:all .2s;white-space:nowrap}
.sn-chip:hover{background:#0a4d2d;color:#fff;border-color:#0a4d2d}
.sn-input-row{display:flex;gap:6px;padding:7px 11px;border-top:1px solid var(--bdr)}
.sn-ta{flex:1;border:1px solid var(--bdr);background:var(--bg-card2);color:var(--txt);font-family:'Nunito Sans',sans-serif;font-size:.8rem;resize:none;outline:none;max-height:72px;border-radius:7px;padding:6px 9px;line-height:1.5;transition:border-color .2s}
.sn-ta:focus{border-color:#4ade80}
.sn-send{width:30px;height:30px;border-radius:7px;border:none;background:linear-gradient(135deg,#0a4d2d,#146434);color:#fff;font-size:.8rem;cursor:pointer;flex-shrink:0;transition:transform .2s}
.sn-send:hover{transform:scale(1.1)}
.typing-d{display:inline-flex;gap:3px;padding:7px 10px;background:var(--bg-card2);border:1px solid var(--bdr);border-radius:11px;border-bottom-left-radius:3px}
.typing-d span{width:3px;height:3px;background:var(--a2);border-radius:50%;animation:td .9s ease-in-out infinite}
.typing-d span:nth-child(2){animation-delay:.2s}.typing-d span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
/* Analyse gestuelle */
.gtabs{display:flex;gap:5px;padding:8px 11px;border-bottom:1px solid var(--bdr)}
.gtab{padding:4px 11px;border-radius:99px;border:1.5px solid var(--bdr2);background:var(--bg-card2);font-family:'Nunito',sans-serif;font-size:.64rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s}
.gtab.active{background:#0a4d2d;color:#fff;border-color:#0a4d2d}
.gpane{padding:11px;display:none}.gpane.active{display:block}
.cam-wrap{position:relative;background:#111;border-radius:9px;overflow:hidden;aspect-ratio:4/3}
.cam-wrap video,.cam-wrap canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cam-wrap canvas{pointer-events:none}
.cam-ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:rgba(0,0,0,.65)}
.cam-lbl{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;font-family:'Nunito',sans-serif;font-size:.58rem;font-weight:700;padding:2px 9px;border-radius:99px;pointer-events:none}
/* Sélecteur de signe — custom input */
.sign-target-row{padding:9px 11px;border-bottom:1px solid var(--bdr);background:var(--bg-card2)}
.sign-preset-btns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.sign-b{padding:3px 9px;background:var(--bg-card);border:1.5px solid var(--bdr2);border-radius:99px;font-family:'Nunito',sans-serif;font-size:.64rem;font-weight:700;color:var(--txt);cursor:pointer;transition:all .2s}
.sign-b:hover{border-color:#4ade80}.sign-b.active{background:#0a4d2d;color:#fff;border-color:#0a4d2d}
.sign-custom-row{display:flex;gap:6px;align-items:center}
.sign-custom-in{flex:1;padding:5px 10px;background:var(--bg-card);border:1.5px solid var(--bdr2);border-radius:8px;font-family:'Nunito Sans',sans-serif;font-size:.78rem;color:var(--txt);outline:none;transition:border-color .2s}
.sign-custom-in:focus{border-color:#4ade80}
.sign-custom-btn{padding:5px 12px;border-radius:8px;border:none;background:#0a4d2d;color:#fff;font-family:'Nunito',sans-serif;font-size:.66rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
.sign-custom-btn:hover{background:#146434}
.sign-target-display{font-family:'Nunito',sans-serif;font-size:.62rem;color:var(--muted);margin-top:5px}
.sign-target-display strong{color:var(--a2)}
.gest-res{background:var(--bg-card);border:1px solid var(--bdr);border-radius:9px;padding:11px;margin-top:7px;display:none}
.gest-res.show{display:block;animation:fadeUp .3s ease}
.gr-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.gr-score-bar{height:4px;background:var(--bdr);border-radius:99px;overflow:hidden;margin:3px 0}
.gr-score-fill{height:100%;border-radius:99px;transition:width 1s ease}
.gr-detail{font-size:.73rem;color:var(--muted);line-height:1.6;margin-top:5px}
.gr-tip{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.18);border-radius:7px;padding:7px 10px;font-size:.72rem;color:var(--txt);line-height:1.6;margin-top:6px}
.elix-matches{border-top:1px solid var(--bdr);margin-top:10px;padding-top:10px}
.elix-match-item{display:flex;align-items:center;gap:9px;padding:7px 10px;background:var(--bg-card2);border:1.5px solid var(--bdr);border-radius:8px;text-decoration:none;color:var(--muted);font-size:.78rem;transition:all .2s;margin-bottom:4px}
.elix-match-item:hover{border-color:var(--a2);color:var(--a2);transform:translateX(2px)}
.upload-zone{border:2px dashed var(--bdr2);border-radius:9px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.drag{border-color:#4ade80;background:rgba(74,222,128,.04)}
.upload-zone h4{font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:800;color:var(--txt);margin:5px 0 3px}
.upload-zone p{font-size:.65rem;color:var(--muted)}
.det-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.25);border-radius:99px;padding:2px 8px;font-family:'Nunito',sans-serif;font-size:.56rem;font-weight:700;color:#4ade80}
.det-badge::before{content:'';width:4px;height:4px;background:#4ade80;border-radius:50%;animation:dblink 1s ease-in-out infinite}
@keyframes dblink{0%,100%{opacity:.3}50%{opacity:1}}
/* Parcours */
.parc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:11px}
.parc-card{background:var(--bg-card);border:1px solid var(--bdr);border-radius:13px;padding:15px;cursor:pointer;transition:all .2s}
.parc-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px var(--sh2);border-color:var(--bdr2)}
.phrase-item{padding:9px 12px;background:var(--bg-card2);border:1px solid var(--bdr);border-radius:8px;margin-bottom:5px;transition:border-color .2s}
.phrase-item:hover{border-color:var(--bdr2)}
.phrase-fr{font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:700;color:var(--txt);margin-bottom:3px}
.phrase-lsf{font-size:.7rem;color:var(--a2);font-style:italic;line-height:1.5}
.phrase-note{font-size:.66rem;color:var(--muted);margin-top:3px}
/* FAQ */
.faq-cat{font-family:'Nunito',sans-serif;font-size:.58rem;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:var(--a2);padding:5px 0 3px;margin-top:8px}
.faq-item{background:var(--bg-card);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;transition:border-color .2s;margin-bottom:5px}
.faq-item.open{border-color:var(--a2)}
.faq-q{display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer;user-select:none}
.faq-q-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.95rem;background:var(--bg-card2);flex-shrink:0}
.faq-q-txt{flex:1;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:800;color:var(--txt);line-height:1.4}
.faq-chev{font-size:.62rem;color:var(--muted);transition:transform .25s}
.faq-item.open .faq-chev{transform:rotate(180deg)}
.faq-ans{max-height:0;overflow:hidden;transition:max-height .35s ease}
.faq-item.open .faq-ans{max-height:500px}
.faq-ans-in{padding:0 14px 13px 51px;font-size:.78rem;color:var(--muted);line-height:1.8}
.faq-ans-in strong{color:var(--txt)}
.faq-ans-in ul,.faq-ans-in ol{margin:5px 0 0 13px;display:flex;flex-direction:column;gap:2px}
.faq-ans-in a{color:var(--a2);font-weight:700;text-decoration:none}
/* À propos */
.tl-row{display:flex;gap:13px;padding-bottom:16px}
.tl-dot{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.tl-circle{width:11px;height:11px;border-radius:50%;margin-top:4px}
.tl-line{width:2px;flex:1;background:var(--bdr2);margin-top:3px}
.tl-content p{font-size:.8rem;color:var(--txt);line-height:1.6;margin-top:2px}
.tl-yr{font-family:'Nunito',sans-serif;font-size:.66rem;font-weight:800}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
@media(max-width:680px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-box{background:var(--bg-card);border:1px solid var(--bdr);border-radius:11px;padding:14px;text-align:center}
.stat-n{font-family:'Nunito',sans-serif;font-size:1.6rem;font-weight:900;color:var(--a2)}
.stat-lbl{font-size:.64rem;color:var(--muted);margin-top:2px;line-height:1.4}

/* ═══════════════════════════════════════════════════════════
   RESPONSIVE — adapté tel / tablette / ordi / TV
   ═══════════════════════════════════════════════════════════ */

/* Bouton hamburger flottant (mobile uniquement) */
.menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:1000;background:var(--bg-card);border:1px solid var(--bdr2);border-radius:10px;width:42px;height:42px;font-size:1.3rem;cursor:pointer;color:var(--txt);align-items:center;justify-content:center;box-shadow:0 3px 12px var(--sh2);-webkit-tap-highlight-color:transparent;transition:all .2s}
.menu-btn:hover{border-color:var(--a2);color:var(--a2)}
.menu-btn:active{transform:scale(.94)}
.side-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998;animation:fadeIn .25s ease}
.side-overlay.on{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── GRANDS ÉCRANS / TV (≥1600px) ─────────────────────────── */
@media(min-width:1600px){
  .wrap{grid-template-columns:320px 1fr;max-width:1800px;margin:0 auto}
  .main{padding:36px 48px;font-size:1.05rem}
  .main-title{font-size:1.9rem}
  .main-sub{font-size:1rem}
  .cgrid{grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .parc-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .logo{font-size:1.7rem}
  .streak-n{font-size:2.5rem}
}

/* ── ÉCRAN STANDARD ORDI (1200–1599px) ─ rien à changer */

/* ── PETIT ORDI / GRANDE TABLETTE (1024–1199px) ──────────── */
@media(max-width:1199px){
  .wrap{grid-template-columns:240px 1fr}
  .main{padding:24px 26px}
  .side{padding:22px 16px;gap:18px}
  .cgrid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
}

/* ── TABLETTE (768–1023px) ───────────────────────────────── */
@media(max-width:1023px){
  .wrap{grid-template-columns:220px 1fr}
  .main{padding:22px 22px}
  .side{padding:20px 14px;gap:16px}
  .logo{font-size:1.3rem}
  .main-title{font-size:1.4rem}
  .main-sub{font-size:.85rem}
  .cgrid{grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:11px}
  .parc-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .acc-mini{width:42px}
}

/* ── MOBILE & PETITE TABLETTE (≤767px) ───────────────────── */
@media(max-width:767px){
  /* La sidebar devient un drawer coulissant */
  .wrap{grid-template-columns:1fr;display:block}
  .side{
    position:fixed;
    top:0;left:0;
    width:280px;
    max-width:85vw;
    height:100vh;
    z-index:999;
    transform:translateX(-100%);
    transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .4s;
    box-shadow:4px 0 24px rgba(0,0,0,.25);
    padding:22px 18px;
    gap:16px;
  }
  .side.open{transform:translateX(0)}
  .menu-btn{display:flex}

  /* Main occupe toute la largeur, padding-top pour laisser la place au bouton ☰ */
  .main{padding:16px 14px;overflow-y:visible}
  .main-top{
    flex-direction:row;
    flex-wrap:wrap;
    align-items:flex-start;
    gap:10px;
    padding:0 0 14px 54px;
    margin-bottom:16px;
    min-height:42px;
  }
  .main-title{font-size:1.15rem;line-height:1.2}
  .main-sub{font-size:.78rem;margin-top:4px}

  /* Cartes en pleine largeur */
  .cgrid{grid-template-columns:1fr;gap:10px}
  .parc-grid{grid-template-columns:1fr;gap:10px}
  .card{padding:14px}
  .card.full{grid-column:1}

  /* Accordéons compacts */
  .acc-head{padding:14px 14px;gap:11px}
  .acc-emoji{font-size:1.3rem}
  .acc-name{font-size:.92rem}
  .acc-code{font-size:.55rem}
  .acc-mini{width:38px}
  .acc-pct{font-size:.58rem}
  .acc-body{padding:0 14px 16px}
  .obj-box{font-size:.85rem;padding:10px 12px}

  /* Stats en 2 colonnes */
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-box{padding:11px}
  .stat-n{font-size:1.3rem}

  /* Vocab plus dense */
  .vcols{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));max-height:280px}

  /* Badge pill plus petit */
  .bdg-pill{padding:5px 10px;font-size:.55rem}

  /* Focus overlay ajusté */
  .fov{padding:24px 18px}
  .ftitle{font-size:1.4rem}
  .fdesc{font-size:.88rem;padding:11px 13px}
  .ftimer{font-size:3.4rem}
  .femoji{font-size:2.6rem}
  .fb{padding:11px 22px;font-size:.92rem}

  /* Signa & analyse gestuelle */
  .signa-layout{grid-template-columns:1fr;gap:12px}
  .sn-msgs{min-height:220px;max-height:280px}
  .smsg-bub{font-size:.82rem;max-width:88%}
  .gtabs{flex-wrap:wrap}
  .cam-wrap{aspect-ratio:1/1}

  /* FAQ */
  .faq-q{padding:11px 12px;gap:8px}
  .faq-q-txt{font-size:.78rem}
  .faq-q-ico{width:24px;height:24px;font-size:.85rem}
  .faq-ans-in{padding:0 12px 11px 44px;font-size:.75rem}

  /* Badges */
  .bg-grid{grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:9px}
  .bg-item{padding:12px 9px}
  .bg-ico{font-size:1.5rem}
  .bg-name{font-size:.7rem}

  /* Toast */
  .toast{bottom:14px;right:14px;left:14px;text-align:center;font-size:.88rem;padding:10px 14px}
}

/* ── PETIT MOBILE (≤400px) ──────────────────────────────── */
@media(max-width:400px){
  .main{padding:14px 11px}
  .main-title{font-size:1rem}
  .main-sub{font-size:.72rem}
  .acc-head{padding:12px 11px;gap:9px}
  .acc-name{font-size:.86rem}
  .acc-mini{display:none}
  .card{padding:12px}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:7px}
  .stat-n{font-size:1.15rem}
  .stat-lbl{font-size:.58rem}
  .ftimer{font-size:2.8rem}
  .ftitle{font-size:1.2rem}
  .fbtns{flex-direction:column;width:100%}
  .fb{width:100%}
  .vcols{grid-template-columns:repeat(2,1fr)}
  .bg-grid{grid-template-columns:repeat(2,1fr)}
}

/* ── ORIENTATION PAYSAGE MOBILE (hauteur faible) ─────────── */
@media(max-height:500px) and (max-width:900px){
  .side{padding:14px 14px;gap:12px}
  .streak-box{padding:10px}
  .flame{font-size:1.5rem}
  .streak-n{font-size:1.6rem}
  .fov{padding:18px}
  .ftimer{font-size:2.5rem;margin-bottom:8px}
  .femoji{font-size:2rem;margin-bottom:8px}
  .ftitle{font-size:1.2rem;margin-bottom:6px}

}

/* ── Accessibilité tactile : zones de tap ≥40px ──────────── */
@media(hover:none) and (pointer:coarse){
  .nav-btn,.bdg-nav{min-height:42px}

  [data-theme="dark"] .tog-thumb{transform:translateX(24px)}
  .sn-chip{padding:6px 11px}
  .fb{min-height:44px}
}

<body>
<div class="wrap">
  <aside class="side">
    <div class="logo">LSF<small>Mon Parcours Visuel</small></div>
    <div class="streak-box">
      <span class="flame">🔥</span>
      <div class="streak-n" id="sN">7</div>
      <div class="streak-lbl">Jours d'affilée</div>
      <div class="streak-days" id="sDays"></div>
    </div>
    <div class="gprog">
      <div class="prow"><span class="plbl">Progression totale</span><span class="ppct" id="gPct">0%</span></div>
      <div class="ptrack"><div class="pfill" id="gBar" style="width:0%"></div></div>
    </div>
    <div>
      <div class="nav-title">Niveaux</div>
      <div class="nav-list" id="navList"></div>
    </div>
    <div class="theme-row">
      <div class="tog-track" id="togBtn" tabindex="0" role="button" aria-label="Changer thème"><div class="tog-thumb"></div></div>
      <span class="tog-lbl" id="togLbl">Mode clair</span>
    </div>
  </aside>
  <main class="main" id="mainArea">
    <div class="main-top">
      <div><div class="main-title">🌱 Mon Parcours LSF</div><div class="main-sub">Clique sur un niveau pour déplier son contenu</div></div>
      <button class="bdg-pill" id="bdgBtn">🏅 <span id="bdgTxt">0 badges</span></button>
    </div>
    <div class="levels-list" id="lvlList"></div>
  </main>
</div>
<button class="menu-btn" id="menuBtn" aria-label="Ouvrir le menu">☰</button>
<div class="side-overlay" id="sideOv"></div>
<div class="fov" id="fov">
  <button class="fclose" id="fClose">✕ Quitter</button>
  <div class="finner">
    <span class="femoji" id="fEmoji">🎯</span>
    <div class="ftitle" id="fTitle"></div>
    <div class="fdesc" id="fDesc"></div>
    <div class="ftimer" id="fTimer">20:00</div>
    <div class="fbtns"><button class="fb" id="fStart">▶ Démarrer</button><button class="fb sec" id="fReset">↺ Reset</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── RESSOURCES GLOBALES ──────────────────────────────────────────────────────
const RESSOURCES = [
  {t:'🔍 DicoElix — Dictionnaire vidéo LSF',u:'https://dico.elix-lsf.fr/',special:true},
  {t:'📺 Chaîne AdSignes (YouTube)',u:'https://www.youtube.com/@ADSignes/videos',special:true},
];

// ── DATA 1000 SIGNES ─────────────────────────────────────────────────────────
const LVL = [
  {
    emoji:'🌱',code:'A1',name:'Les Bases',months:'Mois 1–2',
    obj:'Se présenter, dire son état, décrire objets et personnes simples, comprendre des échanges lents.',
    vocab:[

let S={theme:'light',streak:7,checks:{},vids:0,badges:{},open:-1};

async function load(){
  try{
    let loaded = false;
    // 1. Essayer window.storage (Claude.ai — données persistantes)
    if(window.storage && window.storage.get){
      try{
        const r = await window.storage.get('lsf_v16');
        if(r && r.value){
          S = Object.assign(S, JSON.parse(r.value));
          loaded = true;
        }
      }catch(e){ /* clé absente = premier lancement */ }
    }
    // 2. Toujours essayer localStorage en complément
    if(!loaded){
      const data = localStorage.getItem('lsf_v16');
      if(data) S = Object.assign(S, JSON.parse(data));
    }
  }catch(e){ console.log('Load error:',e); }
}
async function save(){
  try{
    const data = JSON.stringify(S);
    // Écrire dans localStorage TOUJOURS (navigateur local)
    try{ localStorage.setItem('lsf_v16', data); }catch(e){}
    // Écrire dans window.storage TOUJOURS si disponible (Claude.ai)
    if(window.storage && window.storage.set){
      try{ await window.storage.set('lsf_v16', data); }catch(e){}
    }
  }catch(e){ console.log('Save error:',e); }
}

function ck(li,ti){return 't_'+li+'_'+ti;}
function vk(li,vi){return 'v_'+li+'_'+vi;}
function ek(li,ei){return 'e_'+li+'_'+ei;}
function lDone(li){return LVL[li].checks.filter((_,ti)=>S.checks[ck(li,ti)]).length;}
function lTot(li){return LVL[li].checks.length;}
function vDone(li){return LVL[li].vocab.filter((_,vi)=>S.checks[vk(li,vi)]).length;}
function vTot(li){return LVL[li].vocab.length;}
function eDone(li){return LVL[li].expr.filter((_,ei)=>S.checks[ek(li,ei)]).length;}
function eTot(li){return LVL[li].expr.length;}
function lPct(li){const td=lDone(li),tt=lTot(li),vd=vDone(li),vt=vTot(li),ed=eDone(li),et=eTot(li);const total=tt+vt+et;return total?Math.round((td+vd+ed)/total*100):0;}
function gPct(){let d=0,t=0;LVL.forEach((_,i)=>{d+=lDone(i)+vDone(i)+eDone(i);t+=lTot(i)+vTot(i)+eTot(i);});return t?Math.round(d/t*100):0;}

function totalVocabDone(){let d=0;LVL.forEach((_,i)=>d+=vDone(i));return d;}
function totalExprDone(){let d=0;LVL.forEach((_,i)=>d+=eDone(i));return d;}
function totalTasksDone(){let d=0;LVL.forEach((_,i)=>d+=lDone(i));return d;}

function syncBadges(){
  const prev=Object.values(S.badges).filter(Boolean).length;
  const tvd=totalVocabDone(), ted=totalExprDone(), ttd=totalTasksDone();
  const gp=gPct();

  BDGS.forEach(b=>{
    if(S.badges[b.id])return;
    let ok=false;
    // Premiers pas
    if(b.cond==='any')  ok=Object.values(S.checks).some(Boolean);
    if(b.cond==='t5')   ok=ttd>=5;
    if(b.cond==='t20')  ok=ttd>=20;
    if(b.cond==='t50')  ok=ttd>=50;
    // Streaks
    if(b.cond==='s3')   ok=S.streak>=3;
    if(b.cond==='s7')   ok=S.streak>=7;
    if(b.cond==='s14')  ok=S.streak>=14;
    if(b.cond==='s30')  ok=S.streak>=30;
    if(b.cond==='s60')  ok=S.streak>=60;
    // Vocabulaire
    if(b.cond==='vs10')   ok=tvd>=10;
    if(b.cond==='vs50')   ok=tvd>=50;
    if(b.cond==='vs100')  ok=tvd>=100;
    if(b.cond==='vs250')  ok=tvd>=250;
    if(b.cond==='vs500')  ok=tvd>=500;
    if(b.cond==='vs1000') ok=tvd>=1000;
    // Expressions
    if(b.cond==='e10')  ok=ted>=10;
    if(b.cond==='e50')  ok=ted>=50;
    if(b.cond==='e100') ok=ted>=100;
    // Vidéos
    if(b.cond==='v5')   ok=S.vids>=5;
    if(b.cond==='v10')  ok=S.vids>=10;
    if(b.cond==='v30')  ok=S.vids>=30;
    if(b.cond==='v50')  ok=S.vids>=50;
    // Niveaux 50%
    if(b.cond.startsWith('h')){const i=parseInt(b.cond[1]);ok=lPct(i)>=50;}
    // Niveaux 100%
    if(b.cond.startsWith('l')&&!b.cond.startsWith('l.')){const i=parseInt(b.cond[1]);ok=lDone(i)===lTot(i)&&vDone(i)===vTot(i)&&eDone(i)===eTot(i);}
    // Spéciaux
    if(b.cond==='g50')   ok=gp>=50;
    if(b.cond==='all')   ok=LVL.every((_,i)=>lDone(i)===lTot(i)&&vDone(i)===vTot(i)&&eDone(i)===eTot(i));
    if(b.cond==='note1') ok=!!(S.hasNote);
    if(b.cond==='combo') ok=!!(S.combo);
    if(b.cond==='sess10')ok=!!(S.sess>=10);
    if(ok)S.badges[b.id]=true;
  });

  const after=Object.values(S.badges).filter(Boolean).length;
  if(after>prev){
    const newBadges=BDGS.filter(b=>S.badges[b.id]).slice(-1);
    if(newBadges.length)showToast('🏅 Badge : '+newBadges[0].name+' '+newBadges[0].emoji);
  }
  const n=Object.values(S.badges).filter(Boolean).length;
  const el=document.getElementById('bdgTxt');if(el)el.textContent=n+' badge'+(n>1?'s':'');
}

function renderLevels(){S.view='levels';save();
  const area=document.getElementById('mainArea');
  area.innerHTML=`<div class="main-top"><div><div class="main-title">🌱 Mon Parcours LSF</div><div class="main-sub">Clique sur un niveau pour déplier son contenu</div></div><button class="bdg-pill" id="bdgBtn">🏅 <span id="bdgTxt">0 badges</span></button></div><div class="levels-list" id="lvlList"></div>`;
  document.getElementById('bdgBtn').addEventListener('click',showBadges);
  syncBadges();
  const list=document.getElementById('lvlList');
  LVL.forEach((lvl,li)=>{
    const isOpen=S.open===li;
    const item=document.createElement('div');item.className='acc-item'+(isOpen?' open':'');item.id='acc'+li;
    const head=document.createElement('div');head.className='acc-head';
    const total=lDone(li)+vDone(li)+eDone(li),totalMax=lTot(li)+vTot(li)+eTot(li);
    head.innerHTML=`<span class="acc-emoji">${lvl.emoji}</span><div class="acc-info"><div class="acc-code">${lvl.months}</div><div class="acc-name">${lvl.code} — ${lvl.name}</div></div><div class="acc-right"><span class="acc-pct" id="ap${li}">${total}/${totalMax}</span><div class="acc-mini"><div class="acc-mini-f" id="amf${li}" style="width:${lPct(li)}%"></div></div><span class="acc-chev">▾</span></div>`;
    head.addEventListener('click',()=>toggleLevel(li));item.appendChild(head);
    const body=document.createElement('div');body.className='acc-body';
    if(isOpen)fillBody(body,lvl,li);
    item.appendChild(body);list.appendChild(item);
  });
}

function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e;}

function fillBody(body,lvl,li){
  body.appendChild(el('div','obj-box','🎯 '+lvl.obj));
  body.appendChild(el('div','dur-tag','⏱ '+lvl.duree));
  const fb=el('button','focus-sm','🎯 Mode Focus — Tâche du jour');
  fb.addEventListener('click',()=>openFocus(li));body.appendChild(fb);
  const grid=el('div','cgrid');grid.style.marginTop='6px';body.appendChild(grid);

  // Checklist tâches
  const done=lDone(li),tot=lTot(li),pct=Math.round(done/tot*100);
  const cc=el('div','card');
  cc.innerHTML=`<span class="cico">✅</span><div class="ctit">Checklist du jour</div><div class="cl">${lvl.checks.map((t,ti)=>{const on=!!S.checks[ck(li,ti)];return`<div class="ci" data-type="t" data-li="${li}" data-ti="${ti}"><div class="cb${on?' on':''}" id="cb_t_${li}_${ti}"></div><span class="ctxt${on?' done':''}" id="ct_t_${li}_${ti}">${t}</span></div>`;}).join('')}</div><div class="xpbar"><div class="xrow"><span class="xlbl">Tâches</span><span class="xval" id="xv_t_${li}">${done}/${tot}</span></div><div class="xtrack"><div class="xfill" id="xf_t_${li}" style="width:${pct}%"></div></div></div>`;
  cc.querySelectorAll('.ci').forEach(ci=>ci.addEventListener('click',()=>toggleCheck('t',parseInt(ci.dataset.li),parseInt(ci.dataset.ti))));
  grid.appendChild(cc);

  // Vocab checklist avec recherche
  const vdone=vDone(li),vtot=vTot(li),vpct=Math.round(vdone/vtot*100);
  const vc=el('div','card full');
  const vocId='vcl'+li;
  vc.innerHTML=`<span class="cico">📖</span><div class="ctit">Les ${vtot} signes à maîtriser — ${lvl.code}</div><div class="cbod" style="margin-bottom:8px;font-size:.82rem">Coche chaque signe une fois maîtrisé · Utilise <a href="https://dico.elix-lsf.fr/" target="_blank" rel="noopener" style="color:var(--a2);text-decoration:none">DicoElix</a> pour voir la vidéo du signe 🎬</div><input class="vsearch" id="vs${li}" placeholder="🔍 Rechercher un signe..." type="text"><div class="vcols" id="${vocId}">${lvl.vocab.map((v,vi)=>{const on=!!S.checks[vk(li,vi)];return`<div class="ci" data-type="v" data-li="${li}" data-ti="${vi}"><div class="cb${on?' on':''}" id="cb_v_${li}_${vi}"></div><span class="ctxt${on?' done':''}" id="ct_v_${li}_${vi}">${v}</span></div>`;}).join('')}</div><div class="xpbar"><div class="xrow"><span class="xlbl">Signes maîtrisés</span><span class="xval" id="xv_v_${li}">${vdone}/${vtot}</span></div><div class="xtrack"><div class="xfill" id="xf_v_${li}" style="width:${vpct}%"></div></div></div>`;
  vc.querySelectorAll('.ci').forEach(ci=>ci.addEventListener('click',()=>toggleCheck('v',parseInt(ci.dataset.li),parseInt(ci.dataset.ti))));
  // Filtre de recherche
  const si=vc.querySelector('#vs'+li);
  si.addEventListener('input',()=>{
    const q=si.value.toLowerCase();
    vc.querySelectorAll('#'+vocId+' .ci').forEach(row=>{
      row.style.display=row.querySelector('.ctxt').textContent.toLowerCase().includes(q)?'':'none';
    });
  });
  grid.appendChild(vc);

  // Structures
  const sc=el('div','card struct-card');
  const structRows=lvl.structs.map(([name,pattern])=>{
    // Détecter le séparateur (+ ou →)
    const sep = pattern.includes('→') ? '→' : '+';
    const tokens = pattern.split(sep).map(t=>t.trim()).filter(Boolean);
    const arrowChar = '→';
    const tokHtml = tokens.map((t,i)=>{
      const arrow = i<tokens.length-1 ? `<span class="struct-arrow">${arrowChar}</span>` : '';
      return `<span class="struct-token">${t}</span>${arrow}`;
    }).join('');
    return`<div class="struct-row"><div class="struct-name">${name}</div><div class="struct-tokens">${tokHtml}</div></div>`;
  }).join('');
  sc.innerHTML=`<span class="cico">🏗️</span><div class="ctit">Structures de phrases</div><div class="struct-list">${structRows}</div>`;
  grid.appendChild(sc);
  // Expressions checklist
  const edone=eDone(li),etot=eTot(li),epct=Math.round(edone/etot*100);
  const ec=el('div','card');
  ec.innerHTML=`<span class="cico">✋</span><div class="ctit">Expressions & Métaphores à maîtriser</div><div class="cbod" style="margin-bottom:8px;font-size:.82rem">Coche chaque expression une fois pratiquée :</div><div class="cl">${lvl.expr.map((e,ei)=>{const on=!!S.checks[ek(li,ei)];return`<div class="ci" data-type="e" data-li="${li}" data-ti="${ei}"><div class="cb${on?' on':''}" id="cb_e_${li}_${ei}"></div><span class="ctxt${on?' done':''}" id="ct_e_${li}_${ei}">${e}</span></div>`;}).join('')}</div><div class="xpbar"><div class="xrow"><span class="xlbl">Expressions maîtrisées</span><span class="xval" id="xv_e_${li}">${edone}/${etot}</span></div><div class="xtrack"><div class="xfill" id="xf_e_${li}" style="width:${epct}%"></div></div></div>`;
  ec.querySelectorAll('.ci').forEach(ci=>ci.addEventListener('click',()=>toggleCheck('e',parseInt(ci.dataset.li),parseInt(ci.dataset.ti))));
  grid.appendChild(ec);
  // Erreurs
  const errc=el('div','card');errc.innerHTML=`<span class="cico">⚠️</span><div class="ctit">Erreurs fréquentes</div><div class="err-list">${lvl.errs.map(e=>`<div class="err-item"><div class="err-p">❌ ${e.p}</div><div class="err-f">✅ ${e.f}</div></div>`).join('')}</div>`;grid.appendChild(errc);

  // Vidéos + ressources
  const vidc=el('div','card');
  vidc.innerHTML=`<span class="cico">🎬</span><div class="ctit">Vidéos recommandées</div><div class="vlist">${lvl.vids.map((v,vi)=>`<a class="vitem" href="${v.u}" target="_blank" rel="noopener" data-vi="${vi}">${v.t}<span class="varr">↗</span></a>`).join('')}</div><div class="res-box"><div class="res-title">📌 Ressources essentielles (tous niveaux)</div>${RESSOURCES.map(r=>`<a class="res-link" href="${r.u}" target="_blank" rel="noopener">${r.t} <span style="margin-left:auto;font-size:.65rem;opacity:.6">↗</span></a>`).join('')}</div>`;
  vidc.querySelectorAll('.vitem').forEach(a=>a.addEventListener('click',()=>{S.vids=(S.vids||0)+1;syncBadges();save();}));
  vidc.querySelectorAll('.res-link').forEach(a=>a.addEventListener('click',()=>{S.vids=(S.vids||0)+1;syncBadges();save();}));
  grid.appendChild(vidc);

  // Carte notes pour ce niveau — données lues depuis S.levelNotes
  const notec=el('div','card');
  notec.style.gridColumn='1/-1';
  const levelNoteData = LEVEL_NOTES[li] || '';
  
  notec.innerHTML=`
    <span class="cico">📝</span>
    <div class="ctit">Mes notes sur ${lvl.code}</div>
    <div class="cbod" style="margin-bottom:8px;font-size:.82rem">Ce qui est difficile, les signes qui te posent problème, ce que tu dois améliorer…</div>
    <textarea id="level_note_area_${li}" class="note-global-area" style="min-height:120px;margin-top:8px" placeholder="Prends des notes ici…">${levelNoteData}</textarea>
    <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:8px">
      <span id="level_note_saved_${li}" class="note-saved">✓ Enregistré</span>
      <button id="level_note_clear_${li}" class="note-clear">Effacer</button>
    </div>`;
  grid.appendChild(notec);
  
  // Event listeners — notec.querySelector car body n'est pas encore dans le DOM ici
  const noteArea = notec.querySelector('#level_note_area_'+li);
  const savedLbl = notec.querySelector('#level_note_saved_'+li);
  const clearBtn = notec.querySelector('#level_note_clear_'+li);

  if(noteArea){
    let timer;
    noteArea.addEventListener('input', ()=>{
      clearTimeout(timer);
      timer = setTimeout(async ()=>{
        await saveLevelNote(li, noteArea.value);
        if(savedLbl){ savedLbl.classList.add('show'); setTimeout(()=>savedLbl.classList.remove('show'), 2000); }
      }, 800);
    });
  }
  
  if(clearBtn){
    clearBtn.addEventListener('click', async ()=>{
      if(!noteArea.value || confirm('Effacer les notes pour '+lvl.code+' ?')){
        noteArea.value = '';
        await saveLevelNote(li, '');
        if(savedLbl){ savedLbl.classList.add('show'); setTimeout(()=>savedLbl.classList.remove('show'), 2000); }
      }
    });
  }
}

async function toggleCheck(type,li,ti){
  // Session tracker
  S.sess = (S.sess||0)+1;
  // Combo tracker : on note qu'on a coché au moins 1 de chaque type aujourd'hui
  const today = new Date().toDateString();
  if(!S.comboDay) S.comboDay={};
  S.comboDay[today] = S.comboDay[today]||{t:false,v:false,e:false};
  S.comboDay[today][type] = true;
  if(S.comboDay[today].t && S.comboDay[today].v && S.comboDay[today].e) S.combo=true;
  const k=type==='v'?vk(li,ti):type==='e'?ek(li,ti):ck(li,ti);
  S.checks[k]=!S.checks[k];
  const cb=document.getElementById('cb_'+type+'_'+li+'_'+ti);
  const ct=document.getElementById('ct_'+type+'_'+li+'_'+ti);
  if(cb)cb.className='cb'+(S.checks[k]?' on':'');
  if(ct)ct.className='ctxt'+(S.checks[k]?' done':'');
  const td=lDone(li),tt=lTot(li),tpct=Math.round(td/tt*100);
  const xvt=document.getElementById('xv_t_'+li),xft=document.getElementById('xf_t_'+li);
  if(xvt)xvt.textContent=td+'/'+tt;if(xft)xft.style.width=tpct+'%';
  const vd=vDone(li),vt=vTot(li),vpct=Math.round(vd/vt*100);
  const xvv=document.getElementById('xv_v_'+li),xfv=document.getElementById('xf_v_'+li);
  if(xvv)xvv.textContent=vd+'/'+vt;if(xfv)xfv.style.width=vpct+'%';
  const ed=eDone(li),et=eTot(li),epct2=Math.round(ed/et*100);
  const xve=document.getElementById('xv_e_'+li),xfe=document.getElementById('xf_e_'+li);
  if(xve)xve.textContent=ed+'/'+et;if(xfe)xfe.style.width=epct2+'%';
  const total=td+vd+ed,totalMax=tt+vt+et,totalPct=Math.round(total/totalMax*100);
  const ap=document.getElementById('ap'+li),amf=document.getElementById('amf'+li);
  if(ap)ap.textContent=total+'/'+totalMax;if(amf)amf.style.width=totalPct+'%';
  if(S.checks[k]){if(type==='v')showToast('📖 Signe maîtrisé ! ✊');else if(type==='e')showToast('✋ Expression maîtrisée ! 🔥');else showToast('✅ Tâche accomplie 💪');}
  syncBadges();renderGlobal();buildNav();await save();
}


async function showGrammar(){
  S.view='grammar';
  
  // Charger les notes de grammaire
  let grammarNotes = '';
  let grammarBlockNotes = {};
  try {
    if(window.storage && window.storage.get){
      try{
        const r = await window.storage.get('lsf_grammar_notes');
        if(r && r.value) grammarNotes = r.value;
        const rb = await window.storage.get('lsf_grammar_block_notes');
        if(rb && rb.value) grammarBlockNotes = JSON.parse(rb.value);
      }catch(storageErr){
        const data = localStorage.getItem('lsf_grammar_notes');
        if(data) grammarNotes = data;
        const dataB = localStorage.getItem('lsf_grammar_block_notes');
        if(dataB) grammarBlockNotes = JSON.parse(dataB);
      }
    } else {
      const data = localStorage.getItem('lsf_grammar_notes');
      if(data) grammarNotes = data;
      const dataB = localStorage.getItem('lsf_grammar_block_notes');
      if(dataB) grammarBlockNotes = JSON.parse(dataB);
    }
  } catch(e){console.log('LoadGrammarNotes error:',e);}
  
  const area=document.getElementById('mainArea');
  area.innerHTML=`
    <div class="main-top">
      <div>
        <div class="main-title">📚 Grammaire LSF</div>
        <div class="main-sub">Les concepts grammaticaux essentiels pour maîtriser la LSF</div>
      </div>
      <button class="bdg-pill" id="backBtn">← Retour</button>
    </div>
    
    <div class="note-global" style="margin-bottom:20px">
      <div class="note-global-title">📝 Mes notes de grammaire</div>
      <textarea class="note-global-area" id="note_grammar" placeholder="Tes observations sur les transferts, la temporalité, les questions que tu te poses, les erreurs que tu fais souvent, tes astuces personnelles…" style="min-height:120px">${grammarNotes}</textarea>
      <div style="display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-top:6px">
        <span class="note-saved" id="saved_grammar">✓ Enregistré</span>
        <button class="note-clear" id="clear_grammar">Effacer</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:20px">
      ${GRAMMAR.map((block,bi)=>{
        const blockNotes = grammarBlockNotes['block_'+bi] || '';
        return`
          <div class="card" style="grid-column:1/-1">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
              <span style="font-size:2rem">${block.emoji}</span>
              <div>
                <div style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:var(--txt)">${block.title}</div>
                <div style="font-size:.88rem;color:var(--muted);margin-top:3px">${block.desc}</div>
              </div>
            </div>
            
            <div style="background:var(--bg-card2);border-radius:10px;padding:14px;margin-bottom:12px">
              <div style="font-family:'Space Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--a2);margin-bottom:10px">🧠 Leçons clés</div>
              <div style="display:flex;flex-direction:column;gap:6px">
                ${block.lessons.map(l=>`<div style="font-size:.88rem;color:var(--txt);line-height:1.5;padding-left:10px;position:relative">
                  <span style="position:absolute;left:-2px;color:var(--a2)">▸</span>${l}
                </div>`).join('')}
              </div>
            </div>
            
            <div style="background:var(--bg-card2);border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid var(--bdr)">
              <div style="font-family:'Space Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--a2);margin-bottom:8px">📝 Mes notes sur ce concept</div>
              <textarea class="note-textarea" id="block_note_${bi}" placeholder="Tes observations, difficultés, questions sur ce concept grammatical…" style="min-height:100px;width:100%;background:var(--bg);border:1px solid var(--bdr2);border-radius:8px;padding:10px;font-family:'Crimson Pro',serif;font-size:.88rem;color:var(--txt);resize:vertical;outline:none;line-height:1.5">${blockNotes}</textarea>
              <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:6px">
                <span class="note-saved" id="saved_block_${bi}" style="font-family:'Space Mono',monospace;font-size:.52rem;color:var(--a2);opacity:0;transition:opacity .4s">✓ Enregistré</span>
                <button class="note-clear" id="clear_block_${bi}" style="font-family:'Space Mono',monospace;font-size:.5rem;text-transform:uppercase;letter-spacing:.06em;color:var(--light);background:transparent;border:1px solid var(--bdr);border-radius:5px;padding:2px 7px;cursor:pointer;transition:all .2s">Effacer</button>
              </div>
            </div>
            
            <div style="font-family:'Space Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--light);margin-bottom:8px">🎬 Vidéos</div>

  const grammarArea = document.getElementById('note_grammar');
  let grammarTimer;
  grammarArea.addEventListener('input', () => {
    clearTimeout(grammarTimer);

      await saveGrammarNotes(grammarArea.value);
      flashSaved('grammar');
    }, 800);
  });
  document.getElementById('clear_grammar').addEventListener('click', async ()=>{
    if(!grammarArea.value || confirm('Effacer les notes de grammaire ?')){
      grammarArea.value='';
      await saveGrammarNotes('');
      flashSaved('grammar');
    }
  });
  
  // Notes par bloc grammatical
  GRAMMAR.forEach((block, bi) => {
    const ta = document.getElementById('block_note_'+bi);
    if(!ta) return;
    let t;
    ta.addEventListener('input', ()=>{
      clearTimeout(t);
      t = setTimeout(async ()=>{
        grammarBlockNotes['block_'+bi] = ta.value;
        await saveGrammarBlockNotes(grammarBlockNotes);
        const saved = document.getElementById('saved_block_'+bi);
        if(saved){ saved.style.opacity='1'; setTimeout(()=>saved.style.opacity='0', 2000); }
      }, 800);
    });
    const clearBtn = document.getElementById('clear_block_'+bi);
    if(clearBtn){
      clearBtn.addEventListener('click', async ()=>{
        if(!ta.value || confirm('Effacer les notes de ce concept ?')){
          ta.value=''; grammarBlockNotes['block_'+bi]='';
          await saveGrammarBlockNotes(grammarBlockNotes);
          const saved = document.getElementById('saved_block_'+bi);
          if(saved){ saved.style.opacity='1'; setTimeout(()=>saved.style.opacity='0', 2000); }
        }
      });
    }
  });
  
  document.getElementById('backBtn').addEventListener('click',()=>{renderLevels();buildNav();});
  // Track vidéos
  area.querySelectorAll('.vitem').forEach(a=>{
    a.addEventListener('click',()=>{S.vids=(S.vids||0)+1;syncBadges();save();});
  });
  save();
}

function showBadges(){
  S.view='badges';
  const area=document.getElementById('mainArea');
  const n=Object.values(S.badges).filter(Boolean).length;

  const cats=[
    {label:'🌟 Premiers pas',  ids:['first','t5','t20','t50']},
    {label:'🔥 Régularité',    ids:['s3','s7','s14','s30','s60']},
    {label:'📖 Vocabulaire',   ids:['v10s','v50s','v100s','v250s','v500s','v1000s']},
    {label:'✋ Expressions',   ids:['e10','e50','e100']},
    {label:'🎬 Vidéos',        ids:['v5vid','v10vid','v30vid','v50vid']},
    {label:'🎯 Niveaux',       ids:['a1_half','a1','a2_half','a2','b1_half','b1','b2_half','b2','b2p_half','b2p','c1_half','c1']},
    {label:'💎 Spéciaux',      ids:['halfway','all','notes1','combo','speed']},
  ];

  const bdgMap = {};
  BDGS.forEach(b=>bdgMap[b.id]=b);

  let html=`<div class="main-top"><div><div class="main-title">🏅 Mes Badges</div><div class="main-sub">${n} badge${n>1?'s':''} débloqué${n>1?'s':''} sur ${BDGS.length}</div></div><button class="bdg-pill" id="backBtn">← Retour</button></div>`;

  cats.forEach(cat=>{
    html+=`<div style="margin-bottom:22px"><div style="font-family:Nunito,sans-serif;font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--light);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bdr)">${cat.label}</div><div class="bg-grid">`;
    cat.ids.forEach(id=>{
      const b=bdgMap[id];if(!b)return;
      const ok=!!S.badges[b.id];
      html+=`<div class="bg-item ${ok?'ok':'locked'}">${!ok?'<span class="bg-lock">🔒</span>':''}<span class="bg-ico">${b.emoji}</span><div class="bg-name">${b.name}</div><div class="bg-desc">${b.desc}</div>${ok?'<span class="bg-ok">✓ Débloqué</span>':''}</div>`;
    });
    html+=`</div></div>`;
  });

  html+=`</div>`;
  area.innerHTML=html;
  document.getElementById('backBtn').addEventListener('click',()=>{renderLevels();buildNav();});
  save();
}

async function saveNotes(data){

}

let tSec=1200,tRun=false,tIv=null;
function openFocus(li){
  const lvl=LVL[li];const task=lvl.checks.find((_,ti)=>!S.checks[ck(li,ti)])||lvl.checks[0];
  document.getElementById('fEmoji').textContent=lvl.emoji;document.getElementById('fTitle').textContent=lvl.code+' — '+lvl.name;
  document.getElementById('fDesc').textContent=task;tSec=1200;tRun=false;clearInterval(tIv);
  document.getElementById('fStart').textContent='▶ Démarrer';updTimer();document.getElementById('fov').classList.add('on');
}
function closeFocus(){clearInterval(tIv);tRun=false;document.getElementById('fov').classList.remove('on');}
function updTimer(){const m=String(Math.floor(tSec/60)).padStart(2,'0'),s=String(tSec%60).padStart(2,'0');document.getElementById('fTimer').textContent=m+':'+s;}
function startTimer(){
  if(tRun){clearInterval(tIv);tRun=false;document.getElementById('fStart').textContent='▶ Reprendre';}
  else{tRun=true;document.getElementById('fStart').textContent='⏸ Pause';tIv=setInterval(()=>{if(tSec<=0){clearInterval(tIv);tRun=false;showToast('🎉 20 min de LSF — Incroyable !');closeFocus();return;}tSec--;updTimer();},1000);}
}
function resetTimer(){clearInterval(tIv);tRun=false;tSec=1200;updTimer();document.getElementById('fStart').textContent='▶ Démarrer';}

async function toggleTheme(){S.theme=S.theme==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',S.theme);document.getElementById('togLbl').textContent=S.theme==='dark'?'Mode sombre':'Mode clair';await save();}

async function init(){
  await load();
  document.documentElement.setAttribute('data-theme',S.theme||'light');
  document.getElementById('togLbl').textContent=S.theme==='dark'?'Mode sombre':'Mode clair';
  document.getElementById('togBtn').addEventListener('click',toggleTheme);
  document.getElementById('fClose').addEventListener('click',closeFocus);
  document.getElementById('fStart').addEventListener('click',startTimer);
  document.getElementById('fReset').addEventListener('click',resetTimer);
  // ── Drawer mobile ─────────────────────────────────────
  const side=document.querySelector('.side');
  const ov=document.getElementById('sideOv');
  const mb=document.getElementById('menuBtn');
  const closeDrawer=()=>{side.classList.remove('open');ov.classList.remove('on')};
  const openDrawer=()=>{side.classList.add('open');ov.classList.add('on')};
  if(mb)mb.addEventListener('click',openDrawer);
  if(ov)ov.addEventListener('click',closeDrawer);
  // Fermer le drawer quand on clique un élément de nav (mobile)
  side.addEventListener('click',(e)=>{
    if(window.innerWidth>767)return;
    const t=e.target.closest('.nav-btn,.bdg-nav');
    if(t)setTimeout(closeDrawer,150);
  });
  // Fermer le drawer si on agrandit l'écran
  window.addEventListener('resize',()=>{if(window.innerWidth>767)closeDrawer()});
  await loadLevelNotes();
  renderStreak();renderGlobal();buildNav();
  // Restaurer la dernière vue
  if(S.view==='badges') showBadges();
  else if(S.view==='notes') showNotes();
  else if(S.view==='grammar') showGrammar();
  else if(S.view==='spiritual') showSpiritual();
  else if(S.view==='signa') showSignaIA();
  else if(S.view==='parcours') showParcours();
  else if(S.view==='faq') showFAQ();
  else if(S.view==='apropos') showApropos();
  else renderLevels();
}

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function norm(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function snFindEntry(q){
  const n=norm(q);
  // Score chaque entrée par nombre de mots-clés matchés
  let best=null, bestScore=0;
  for(const e of LSF_KB){
    if(e.k[0]==='__default__') continue;
    let score=0;
    for(const kw of e.k){ if(n.includes(norm(kw))) score += kw.length; } // longer kw = more specific
    if(score>bestScore){ bestScore=score; best=e; }
  }
  return best;
}

function snBuildReply(q, entry){
  snTurnCount++;
  // Réponse introuvable
  if(!entry){
    const unk = pick(SN_UNKNOWN);
    // Suggest related topics
    const suggestions = [
      '<button class="sn-chip" onclick="snChip(\'5 paramètres LSF\')">🖐️ Paramètres</button>',
      '<button class="sn-chip" onclick="snChip(\'comment dire bonjour\')">👋 Bonjour</button>',
      '<button class="sn-chip" onclick="snChip(\'grammaire LSF\')">📐 Grammaire</button>',
    ].join(' ');
    return `${unk}<div style="margin-top:9px;display:flex;flex-wrap:wrap;gap:5px">${suggestions}</div>`;
  }

  const intro = (snTurnCount<=2) ? '' : pick(SN_INTROS);
  const outro = pick(SN_OUTROS);

  // Contextual follow-up chips based on topic
  const followUps = snGetFollowUps(entry.k[0]);
  const chips = followUps.length
    ? `<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:5px">${followUps.map(f=>`<button class="sn-chip" onclick="snChip('${f.q}')" style="font-size:.6rem">${f.label}</button>`).join('')}</div>`
    : '';

  // Occasional encouragement after a few turns
  const encourage = (snTurnCount>0 && snTurnCount%4===0 && Math.random()>.5)
    ? `<div style="margin-top:8px;padding:6px 10px;background:rgba(74,222,128,.08);border-radius:8px;font-size:.72rem;color:var(--a2)">✨ ${pick(SN_ENCOURAGEMENTS)}</div>`
    : '';

  return `${intro}${entry.r}${outro}${chips}${encourage}`;
}

function snGetFollowUps(key){
  const map={

// Détection d'intention : salutation, question courte, etc.
function snDetectIntent(q){
  const n=norm(q);
  if(/^(salut|coucou|hello|allo|hey|bonjour signa)/.test(n)) return 'greeting';
  if(/^(merci|thanks|super|cool|ok|oui|ouais|parfait|genial|nickel)/.test(n)) return 'thanks';
  if(/^(non|pas vraiment|bof|pas clair|je comprends pas)/.test(n)) return 'negative';
  if(/comment (dire|signer|faire|exprimer)/.test(n)) return 'howto';
  if(/c.?est quoi|qu.?est.ce que|def|definition|expliquer|c.?est quoi/.test(n)) return 'definition';
  return 'general';
}

function snSpecialReply(intent, q){
  if(intent==='greeting') return `Coucou ! 👋 Contente de te voir ici. Tu veux apprendre un signe aujourd'hui, ou tu as une question sur la grammaire ?<div style="margin-top:9px;display:flex;flex-wrap:wrap;gap:5px"><button class="sn-chip" onclick="snChip('comment dire bonjour')">👋 Un signe</button><button class="sn-chip" onclick="snChip('grammaire LSF')">📐 La grammaire</button><button class="sn-chip" onclick="snChip('comment progresser en LSF')">🚀 Progresser</button></div>`;
  if(intent==='thanks') return pick([
    'Avec plaisir ! 😊 Tu as d\'autres questions ?',
    'De rien, c\'est pour ça que je suis là ! 🤟',
    'Génial ! Continue comme ça, la pratique régulière fait vraiment la différence.',
    'Super ! N\'hésite pas à revenir quand tu veux.',
    'Avec plaisir ! Tu veux essayer un autre signe ?',
  ]);
  if(intent==='negative') return pick([
    'Ah, je reformule ! Tu veux que j\'explique autrement ?',
    'Hmm, essayons différemment. Qu\'est-ce qui n\'est pas clair ?',
    'Pas de souci ! On peut reprendre depuis le début si tu veux.',
  ]);
  return null;
}

// Simulation de frappe réaliste : délai proportionnel à la longueur de réponse
function snTypingDelay(replyHtml){
  const textLen = replyHtml.replace(/<[^>]+>/g,'').length;
  // 15-25ms par caractère visible, borné entre 300ms et 1800ms
  return Math.min(1800, Math.max(300, textLen * (15 + Math.random()*10)));
}

function snAddMsg(role,html,animate=true){
  if(!snMsgsEl)snMsgsEl=document.getElementById('sn-msgs');
  if(!snMsgsEl)return;
  const d=document.createElement('div');
  d.className='smsg '+role;
  if(animate) d.style.opacity='0';
  d.innerHTML=`<div class="smsg-ico">${role==='ai'?'🤟':'👤'}</div><div class="smsg-bub">${html}</div>`;
  snMsgsEl.appendChild(d);
  if(animate){
    requestAnimationFrame(()=>{
      d.style.transition='opacity .25s ease, transform .25s ease';
      d.style.transform='translateY(4px)';
      requestAnimationFrame(()=>{d.style.opacity='1';d.style.transform='translateY(0)';});
    });
  }
  snMsgsEl.scrollTop=snMsgsEl.scrollHeight;
  snHistory.push({role,html});
}

function snTyping(delay){
  if(!snMsgsEl)snMsgsEl=document.getElementById('sn-msgs');if(!snMsgsEl)return;
  const d=document.createElement('div');d.className='smsg ai';d.id='sn-typing';
  d.innerHTML='<div class="smsg-ico">🤟</div><div class="typing-d"><span></span><span></span><span></span></div>';
  snMsgsEl.appendChild(d);snMsgsEl.scrollTop=snMsgsEl.scrollHeight;
}

function snSend(){
  snInit();if(!snInputEl)return;
  const q=snInputEl.value.trim();if(!q)return;
  snInputEl.value='';snInputEl.style.height='auto';
  if(snChipsEl)snChipsEl.style.display='none';
  snAddMsg('user',q);

  // Build reply first to compute realistic delay
  const intent=snDetectIntent(q);
  const special=snSpecialReply(intent,q);
  const entry=snFindEntry(q);
  const reply = special || snBuildReply(q, entry);
  const delay = snTypingDelay(reply);

  snTyping();
  setTimeout(()=>{
    const t=document.getElementById('sn-typing');if(t)t.remove();
    snAddMsg('ai',reply);
  }, delay);
}
function snChip(txt){snInit();if(snInputEl)snInputEl.value=txt;snSend();}

let mpLoaded=false,mpHands=null,snCamStream=null;
let snVideo=null,snCanvas=null,snCtx=null;
let lastLM=null,targetSign='Bonjour',detLoop=false,animFrId=null;

function loadMP(){
  return new Promise(res=>{
    if(mpLoaded){res(true);return;}
    let done=0,fail=false;
    ['https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js',
     'https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js',
     'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1620248257/camera_utils.js'
    ].forEach(u=>{
      const s=document.createElement('script');s.src=u;
      s.onload=()=>{done++;if(done===3){mpLoaded=true;res(true);}};
      s.onerror=()=>{if(!fail){fail=true;mpLoaded=true;res(false);}};
      document.head.appendChild(s);
    });
  });
}
async function startCam(){
  const lbl=document.getElementById('sn-cam-lbl'),ov=document.getElementById('sn-cam-ov');
  if(lbl){lbl.style.display='block';lbl.textContent='Accès caméra…';}
  try{
    snCamStream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:'user'},audio:false});
  }catch(e){
    const msg=e.name==='NotAllowedError'?'Permission refusée':e.name==='NotFoundError'?'Aucune caméra':e.message;
    if(ov)ov.innerHTML=`<span style="font-size:2rem">⚠️</span><p style="color:#fff;font-size:.72rem;text-align:center;padding:0 10px">${msg}</p><button onclick="startCam()" style="padding:6px 14px;border-radius:8px;background:#0a4d2d;color:#fff;border:none;font-size:.7rem;font-weight:700;cursor:pointer;margin-top:5px">Réessayer</button>`;
    return;
  }
  snVideo=document.getElementById('sn-video');snCanvas=document.getElementById('sn-canvas');snCtx=snCanvas.getContext('2d');
  snVideo.srcObject=snCamStream;snVideo.style.display='block';
  await snVideo.play().catch(()=>{});
  if(ov)ov.style.display='none';
  const ba=document.getElementById('sn-btn-analyse'),bs=document.getElementById('sn-btn-stop');
  if(ba)ba.style.display='flex';if(bs)bs.style.display='flex';
  if(lbl)lbl.textContent='Chargement MediaPipe…';
  const ok=await loadMP();
  if(!ok||typeof Hands==='undefined'){if(lbl)lbl.textContent='Caméra OK (sans squelette)';snDrawLoop();return;}
  mpHands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
  mpHands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.5,minTrackingConfidence:.5});
  mpHands.onResults(onMPRes);
  await mpHands.initialize();
  if(lbl)lbl.textContent='Montrez votre main 🤟';
  detLoop=true;snDetLoop();
}
async function snDetLoop(){
  while(detLoop&&snCamStream&&mpHands){
    if(snVideo&&snVideo.readyState>=2&&!snVideo.paused){try{await mpHands.send({image:snVideo});}catch(e){}}
    await new Promise(r=>setTimeout(r,33));
  }
}
function snDrawLoop(){
  if(!snVideo||!snCtx||!snCamStream)return;
  if(snVideo.videoWidth>0){snCanvas.width=snVideo.videoWidth;snCanvas.height=snVideo.videoHeight;snCtx.drawImage(snVideo,0,0);}
  animFrId=requestAnimationFrame(snDrawLoop);
}
function onMPRes(r){
  if(!snCtx||!snCanvas||!r.image)return;
  const w=r.image.width||snVideo.videoWidth||640,h=r.image.height||snVideo.videoHeight||480;
  snCanvas.width=w;snCanvas.height=h;
  snCtx.clearRect(0,0,w,h);snCtx.drawImage(r.image,0,0,w,h);
  const has=r.multiHandLandmarks&&r.multiHandLandmarks.length>0;
  const db=document.getElementById('sn-det-badge');if(db)db.style.display=has?'inline-flex':'none';
  const lbl=document.getElementById('sn-cam-lbl');if(lbl)lbl.textContent=has?`🤟 ${r.multiHandLandmarks.length} main(s)`:'Montrez votre main…';
  if(has){
    lastLM=r.multiHandLandmarks[0];
    for(const lm of r.multiHandLandmarks){
      if(typeof drawConnectors!=='undefined'){
        drawConnectors(snCtx,lm,HAND_CONNECTIONS,{color:'rgba(74,222,128,.65)',lineWidth:2.5});
        drawLandmarks(snCtx,lm,{color:'#4ade80',fillColor:'#052e16',radius:4,lineWidth:1});
      }else{
        snCtx.fillStyle='#4ade80';
        lm.forEach(p=>{snCtx.beginPath();snCtx.arc(p.x*w,p.y*h,5,0,Math.PI*2);snCtx.fill();});
      }
    }
  }else{lastLM=null;}
}
function stopCam(){
  detLoop=false;
  if(mpHands){try{mpHands.close();}catch(e){}mpHands=null;}
  if(animFrId){cancelAnimationFrame(animFrId);animFrId=null;}
  if(snCamStream){snCamStream.getTracks().forEach(t=>t.stop());snCamStream=null;}
  mpLoaded=false;
  if(snVideo){snVideo.pause();snVideo.srcObject=null;snVideo.style.display='none';}
  const ov=document.getElementById('sn-cam-ov');
  if(ov){ov.style.display='flex';ov.innerHTML=`<span style="font-size:2.5rem">📷</span><button onclick="startCam()" style="padding:7px 15px;border-radius:8px;background:#0a4d2d;color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer">Activer</button><p style="color:rgba(255,255,255,.55);font-size:.6rem;text-align:center">100% local</p>`;}
  ['sn-btn-analyse','sn-btn-stop','sn-det-badge'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const lbl=document.getElementById('sn-cam-lbl');if(lbl)lbl.style.display='none';
}

const SIGN_PAT={
  'Bonjour':{check(fs,or,ht){
    const s=(fs.index&&fs.middle&&fs.ring&&fs.pinky)?40:0,o=(or==='toward_camera'||or==='away_from_camera')?30:0,h=(ht==='head')?30:0;
    const d=[s?'✅ Main ouverte':'❌ Ouvrez la main',o?'✅ Orientation correcte':'❌ Paume vers l’avant',h?'✅ Hauteur correcte':'⚠️ Levez la main au front'];
    return{score:s+o+h,details:d,tips:!s?['Détendez et écartez tous les doigts']:!h?['BONJOUR se signe au niveau du front']:[]}}},
  'Merci':{check(fs,or,ht){
    const s=(fs.index&&fs.middle&&fs.ring&&fs.pinky)?40:0,o=(or==='up'||or==='toward_camera')?30:0,h=(ht==='head'||ht==='chest')?30:0;
    const d=[s?'✅ Main ouverte':'❌ Ouvrez la main',o?'✅ Orientation correcte':'❌ Paume vers le haut/avant',h?'✅ Hauteur correcte':'⚠️ Du menton vers l’avant'];
    return{score:s+o+h,details:d,tips:!s?['Imaginez tenir un plateau — main à plat']:[]}}},
  'Oui':{check(fs,or,ht){
    const s=(!fs.index&&!fs.middle&&!fs.ring&&!fs.pinky)?60:0,h=(ht==='chest'||ht==='head')?40:0;
    return{score:s+h,details:[s?'✅ Poing fermé':'❌ Fermez le poing',h?'✅ Position correcte':'⚠️ Devant le visage'],tips:!s?['Replier tous les doigts fermement']:[]}}},
  'Non':{check(fs,or,ht){
    const s=(fs.index&&fs.middle&&!fs.ring&&!fs.pinky)?55:0,h=(ht==='chest'||ht==='head')?45:0;
    return{score:s+h,details:[s?'✅ Index + majeur tendus':'❌ Tendez index + majeur',h?'✅ Position correcte':'⚠️ Devant le visage'],tips:!s?['Geste en V puis mouvement latéral']:[]}}},
  'Aimer':{check(fs,or,ht){
    const s=(!fs.index&&!fs.middle)?40:20,h=(ht==='chest')?40:0;
    return{score:s+h,details:[s>=40?'✅ Configuration correcte':'⚠️ Main fermée',h?'✅ Sur le cœur':'❌ Main sur la poitrine gauche','💡 Expression faciale !'],tips:!h?['Ce signe est centré sur le cœur']:[]}}},
};

function fingerExt(lm,tip,pip){
  const d=(a,b)=>Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+(a.z-b.z)**2);
  return d(lm[tip],lm[0])>d(lm[pip],lm[0]);
}
function getFS(lm){return{thumb:fingerExt(lm,4,3),index:fingerExt(lm,8,6),middle:fingerExt(lm,12,10),ring:fingerExt(lm,16,14),pinky:fingerExt(lm,20,18)};}
function getOR(lm){
  const w=lm[0],i5=lm[5],p17=lm[17];
  const nz=(i5.x-w.x)*(p17.y-w.y)-(i5.y-w.y)*(p17.x-w.x),ny=(i5.z-w.z)*(p17.x-w.x)-(i5.x-w.x)*(p17.z-w.z);
  if(Math.abs(nz)>Math.abs(ny))return nz>0?'toward_camera':'away_from_camera';
  return ny>0?'up':'down';
}
function getHT(lm){const y=lm[0].y;return y<.4?'head':y<.65?'chest':'low';}

function runAnalysis(lm){
  const fs=getFS(lm),or=getOR(lm),ht=getHT(lm),pat=SIGN_PAT[targetSign];
  if(pat)return{...pat.check(fs,or,ht),or,ht,fs,_lm:lm};
  const ext=Object.values(fs).filter(Boolean).length;
  return{score:50,details:[`📊 Doigts étendus : ${ext}/5`,`🔄 Orientation : ${or}`,`📍 Hauteur : ${ht}`],
         tips:['Signe non prédéfini — analyse générique. Cherchez la vidéo sur Élix pour comparer.'],or,ht,fs,_lm:lm};
}
