function orCode(or){return{toward_camera:'T',away_from_camera:'A',up:'U',down:'D',side:'S'}[or]||'?';}
function htCode(ht){return{head:'H',chest:'C',low:'L'}[ht]||'?';}

function identifySign(lm,n=3){
  if(!lm)return[];
  const fs=getFS(lm),oc=orCode(getOR(lm)),hc=htCode(getHT(lm));
  const arr=[fs.thumb?1:0,fs.index?1:0,fs.middle?1:0,fs.ring?1:0,fs.pinky?1:0];
  return DICT_G.map(d=>{
    let s=0;['th','ix','mi','ri','pi'].forEach((k,i)=>{if(d.g[k]===arr[i])s+=10;});
    if(d.or===oc)s+=25;if(d.ht===hc)s+=25;
    return{...d,ms:s};
  }).sort((a,b)=>b.ms-a.ms).slice(0,n);
}

function renderAnalysis(cid,res){
  const el=document.getElementById(cid);if(!el)return;
  const pct=res.score,col=pct>=70?'#22c55e':pct>=45?'#f59e0b':'#ef4444';
  const ico=pct>=70?'🎉':pct>=45?'👍':'💪';
  const ext=res.fs?Object.values(res.fs).filter(Boolean).length:3;
  const params=[
    {n:'Config.',v:(ext/5)*100},{n:'Orient.',v:['toward_camera','up'].includes(res.or)?80:50},
    {n:'Emplace.',v:res.ht==='head'?85:res.ht==='chest'?70:40},{n:'Mouv.',v:60},{n:'Express.',v:55}
  ];
  const matches=identifySign(res._lm);
  el.className='gest-res show';
  el.innerHTML=`
    <div class="gr-row">
      <span style="font-size:1.6rem">${ico}</span>
      <div style="flex:1">
        <div style="font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:900;color:${col}">${pct>=70?'Excellent !':pct>=45?'En bonne voie':'Continue !'} — <em>${targetSign}</em></div>
        <div class="gr-score-bar" style="width:140px;margin-top:4px"><div class="gr-score-fill" style="width:${pct}%;background:${col}"></div></div>
        <span style="font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:900;color:${col}">${pct}/100</span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:7px">
      ${params.map(p=>{const c=p.v>=65?'#22c55e':p.v>=40?'#f59e0b':'#ef4444';
        return`<div style="background:var(--bg-card2);border:1px solid var(--bdr);border-radius:6px;padding:5px 3px;text-align:center"><div style="font-family:'Nunito',sans-serif;font-size:.46rem;font-weight:800;color:var(--muted);text-transform:uppercase">${p.n}</div><div style="height:2px;background:var(--bdr);border-radius:99px;overflow:hidden;margin:3px 0"><div style="width:${Math.round(p.v)}%;height:100%;background:${c};border-radius:99px"></div></div><div style="font-family:'Nunito',sans-serif;font-size:.52rem;font-weight:800;color:${c}">${Math.round(p.v)}%</div></div>`;}).join('')}
    </div>
    <div class="gr-detail">${res.details.join('<br>')}</div>
    ${res.tips&&res.tips.length?`<div class="gr-tip"><strong>💡</strong> ${res.tips[0]}</div>`:''}
    ${matches.length?`<div class="elix-matches">
      <div style="font-family:'Nunito',sans-serif;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--a2);margin-bottom:7px">📖 Signes proches dans Élix</div>
      ${matches.map((m,i)=>{const rank=['🥇','🥈','🥉'][i],bc=m.ms>=65?'#22c55e':m.ms>=40?'#f59e0b':'#94a3b8';
        return`<a class="elix-match-item" href="https://dico.elix-lsf.fr/dictionnaire/${encodeURIComponent(m.slug)}" target="_blank">
          <span style="font-size:1.3rem">${m.ico}</span>
          <div style="flex:1"><div style="font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:800">${rank} ${m.w}</div>
          <div style="height:2px;background:var(--bdr);border-radius:99px;overflow:hidden;margin-top:3px"><div style="width:${m.ms}%;height:100%;background:${bc};border-radius:99px"></div></div>
          <div style="font-size:.58rem;color:${bc};font-family:'Nunito',sans-serif;font-weight:700">${m.ms}% de correspondance</div></div>
          <span style="color:var(--a2);font-size:.72rem">↗</span></a>`;}).join('')}
    </div>`:''}`;
  showToast('🤟 Analyse terminée !');
}

function handleFileDrop(e){e.preventDefault();const z=document.getElementById('sn-upzone');if(z)z.classList.remove('drag');const f=e.dataTransfer?.files[0];if(f&&f.type.startsWith('video/'))loadVid(f);}
function loadVid(file){if(!file)return;const v=document.getElementById('sn-upvid');if(!v)return;v.src=URL.createObjectURL(file);v.load();const w=document.getElementById('sn-upwrap'),z=document.getElementById('sn-upzone');if(w)w.style.display='block';if(z)z.style.display='none';showToast('✅ Vidéo chargée !');}
function resetVid(){const w=document.getElementById('sn-upwrap'),z=document.getElementById('sn-upzone'),r=document.getElementById('sn-up-res'),i=document.getElementById('sn-file-in');if(w)w.style.display='none';if(z)z.style.display='block';if(r)r.className='gest-res';if(i)i.value='';}
async function analyseVid(){
  const vid=document.getElementById('sn-upvid'),resEl=document.getElementById('sn-up-res');
  if(!vid?.src||!resEl)return;
  resEl.className='gest-res show';resEl.innerHTML='<div style="text-align:center;padding:14px"><span style="font-size:1.6rem;display:inline-block;animation:td 1s ease infinite alternate">🧠</span><p style="font-family:Nunito,sans-serif;font-size:.76rem;font-weight:700;margin-top:7px;color:var(--txt)">Analyse en cours…</p></div>';
  const ok=await loadMP();
  if(!ok||typeof Hands==='undefined'){setTimeout(()=>renderAnalysis('sn-up-res',{score:50,details:['⚠️ MediaPipe indisponible'],tips:['Vérifiez votre connexion internet'],or:'unknown',ht:'chest',fs:{},_lm:null}),800);return;}
  if(vid.readyState<1)await new Promise(r=>vid.addEventListener('loadedmetadata',r,{once:true}));
  const dur=vid.duration;if(!dur||isNaN(dur)){resEl.innerHTML='<p style="text-align:center;padding:14px;color:var(--muted);font-size:.78rem">❌ Vidéo illisible</p>';return;}
  const cvs=document.createElement('canvas');cvs.width=320;cvs.height=240;const ctx2=cvs.getContext('2d');
  const tmpH=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
  tmpH.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:.5,minTrackingConfidence:.5});
  await tmpH.initialize();
  let bestRes=null,fdone=false;
  tmpH.onResults(r=>{if(r.multiHandLandmarks?.length&&!bestRes)bestRes=runAnalysis(r.multiHandLandmarks[0]);fdone=true;});
  for(const t of[dur*.25,dur*.5,dur*.75]){
    fdone=false;vid.currentTime=t;
    await new Promise(r=>vid.addEventListener('seeked',r,{once:true}));
    ctx2.drawImage(vid,0,0,320,240);await tmpH.send({image:cvs});
    await new Promise(r=>{const id=setInterval(()=>{if(fdone){clearInterval(id);r();}},40);setTimeout(()=>{clearInterval(id);r();},2000);});
    if(bestRes)break;
  }
  tmpH.close();
  if(!bestRes){resEl.innerHTML='<div style="text-align:center;padding:14px"><span style="font-size:1.8rem">🤲</span><p style="font-family:Nunito,sans-serif;font-size:.8rem;font-weight:700;margin-top:7px;color:var(--txt)">Aucune main détectée</p></div>';return;}
  renderAnalysis('sn-up-res',bestRes);
}

function togglePW(el,pid,i){
  const k='parc_'+pid+'_'+i;S.checks[k]=!S.checks[k];
  const cb=document.getElementById('pw_'+pid+'_'+i),ct=document.getElementById('pt_'+pid+'_'+i);
  if(cb)cb.className='cb'+(S.checks[k]?' on':'');if(ct)ct.className='ctxt'+(S.checks[k]?' done':'');
  if(S.checks[k])showToast('📖 Signe maîtrisé ! ✊');
  syncBadges();save();
}

  S.view='faq';save();

  let html=`<div class="main-top"><div><div class="main-title">❓ Questions fréquentes</div><div class="main-sub">Tout ce que vous avez voulu savoir sur l'apprentissage de la LSF</div></div><button class="bdg-pill" id="backBtn">← Retour</button></div><div style="max-width:680px">`;
  FAQ_D.forEach(s=>{
    html+=`<div class="faq-cat">${s.cat}</div>`;
    s.items.forEach(item=>{
      const id='fq_'+Math.random().toString(36).slice(2);
      html+=`<div class="faq-item" id="${id}"><div class="faq-q" onclick="tglFaq('${id}')"><div class="faq-q-ico">${item.ico}</div><div class="faq-q-txt">${item.q}</div><div class="faq-chev">▼</div></div><div class="faq-ans"><div class="faq-ans-in">${item.a}</div></div></div>`;
    });
  });
  html+=`</div><div style="margin-top:24px;background:var(--bg-card2);border:1px solid var(--bdr2);border-radius:13px;padding:18px;text-align:center;max-width:680px"><div style="font-size:1.5rem;margin-bottom:8px">🤟</div><h3 style="font-family:'Nunito',sans-serif;font-weight:900;color:var(--txt);font-size:.9rem;margin-bottom:7px">Autre question ?</h3><p style="font-size:.76rem;color:var(--muted);margin-bottom:12px">Posez-la à Signa, votre assistante pédagogique.</p><button class="focus-sm" onclick="showSignaIA()">💬 Parler à Signa</button></div>`;
  area.innerHTML=html;
  document.getElementById('backBtn').addEventListener('click',()=>{renderLevels();buildNav();});
}
function tglFaq(id){const el=document.getElementById(id);if(!el)return;const was=el.classList.contains('open');document.querySelectorAll('.faq-item.open').forEach(e=>e.classList.remove('open'));if(!was)el.classList.add('open');}
